# Docker services for integration tests against real MySQL + MSSQL.
#
# Not used by the default test suite — `pnpm test` doesn't spin up
# containers. To run the dockerized suite:
#
#   docker compose -f test/integration/dockerized/docker-compose.yml up -d
#   INTEGRATION_DB=1 pnpm vitest run test/integration/dockerized/
#   docker compose -f test/integration/dockerized/docker-compose.yml down
#
# The containers bind to localhost-only ports (not 0.0.0.0) so
# CI / shared dev machines don't expose them accidentally.

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: sumak
      MYSQL_DATABASE: sumak_test
    ports:
      - "127.0.0.1:3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psumak"]
      interval: 2s
      timeout: 5s
      retries: 20

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "SumakTest1!"
      MSSQL_PID: "Developer"
    ports:
      - "127.0.0.1:1434:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'SumakTest1!' -C -Q 'SELECT 1' || exit 1",
        ]
      interval: 3s
      timeout: 5s
      retries: 30
